name: Auto Release

on:
  schedule:
    - cron: "0 * * * *"   # щогодини
  workflow_dispatch:       # ручний запуск

permissions:
  contents: write          # потрібно для push тегів і комітів

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # потрібно щоб git rev-parse тегів працював

      - uses: fregante/setup-git-user@v2

      - name: Fetch latest version
        id: fetch
        run: |
          chmod +x fetch_latest.sh
          ./fetch_latest.sh

      - name: Release new versions
        run: |
          chmod +x release.sh
          ./release.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}